<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Anti-flash theme script (DGA Platforms Code). Runs before React paints so
         there is no flash of the wrong theme. Owns data-theme on <html>; do NOT
         hardcode data-theme on the <html> tag. Persisted by ThemeToggle. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('jabeen-theme');
          if (t !== 'light' && t !== 'dark') t = 'dark'; /* brand default */
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <title>JABEEN Investor Portal</title>
    <meta name="description" content="JABEEN Investor Portal — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="JABEEN Investor Portal" />
    <meta property="og:description" content="JABEEN Investor Portal — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JABEEN Investor Portal" />
    <meta name="twitter:description" content="JABEEN Investor Portal — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">

  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
